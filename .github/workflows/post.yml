name: Auto Post Horoscope to X

on:
  schedule:
    # Runs every hour at minute 0, UTC
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      hour:
        description: 'Specific hour to post (0-23, leave empty for all pending)'
        required: false
        type: string

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: npm install
      
      - name: Post to X
        env:
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
          X_WEB_BEARER: ${{ secrets.X_WEB_BEARER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          POST_HOUR: ${{ github.event.inputs.hour }}
        run: |
          npx tsx scripts/github-post.ts
